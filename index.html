<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalTrack - Hospital Resource Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased text-gray-800 bg-white font-sans">
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-50 p-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-blue-200">
                    <i data-lucide="activity" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">VitalTrack</h1>
                <p class="text-slate-500">Hospital Resource Management</p>
            </div>
            
<form id="login-form" class="space-y-4">
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
        <input type="text" id="username" required
        class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"
        placeholder="Enter email">
    </div>

    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
        <input type="password" id="password" required
        class="w-full px-4 py-2 border border-slate-200 rounded-xl"
        placeholder="Enter password">
    </div>

    <div id="login-error" class="text-rose-500 text-sm hidden"></div>

    <button type="submit"
    class="w-full btn-primary py-3 flex items-center justify-center gap-2">
        Sign In
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
    </button>

    <!-- SIGNUP BUTTON -->
    <p class="text-center text-sm text-slate-500">
        Don't have an account?
<button type="button" id="signup-btn"
class="text-blue-600 font-semibold hover:underline cursor-pointer">
            Create Account
        </button>
    </p>

</form>
            <div class="mt-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
                <p class="text-xs text-blue-700 text-center font-medium">Demo Credentials: admin / admin123</p>
            </div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <!-- Sidebar -->
        <aside class="fixed left-0 top-0 bottom-0 w-64 bg-white border-r border-slate-200 z-50 hidden lg:flex flex-col">
            <div class="p-6 flex items-center gap-3 border-b border-slate-100">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100">
                    <i data-lucide="activity" class="w-6 h-6 text-white"></i>
                </div>
                <span class="font-bold text-xl tracking-tight text-slate-900">VitalTrack</span>
            </div>
            
            <nav class="flex-1 p-4 space-y-2">
                <button data-view="dashboard" class="nav-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="font-semibold">Dashboard</span>
                </button>
                <button data-view="resources" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="database" class="w-5 h-5"></i>
                    <span class="font-semibold">Resource Hub</span>
                </button>
                <button data-view="allocation" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    <span class="font-semibold">Patient Allocation</span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">A</div>
                        <div>
                            <p class="text-sm font-bold text-slate-900" id="user-display-name">Admin User</p>
                            <p class="text-xs text-slate-500">Staff Member</p>
                        </div>
                    </div>
                    <button id="logout-btn" class="w-full flex items-center justify-center gap-2 py-2 text-sm font-bold text-rose-600 hover:bg-rose-50 rounded-lg transition-all">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="lg:ml-64 flex-1 flex flex-col">
            <!-- Header -->
            <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-40">
                <div class="flex items-center gap-4">
                    <h2 id="view-title" class="text-xl font-bold text-slate-900">Dashboard Overview</h2>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative hidden md:block">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="search-query" placeholder="Search resources..." class="pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none w-64 transition-all">
                    </div>
                    <button class="p-2 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-all relative">
                        <i data-lucide="clock" class="w-5 h-5 text-slate-500"></i>
                        <span id="sync-indicator" class="absolute top-0 right-0 w-2 h-2 bg-emerald-500 rounded-full animate-pulse hidden"></span>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content-area" class="p-8 space-y-8">
                <!-- Views will be injected here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 overflow-hidden">
            <!-- Modal content injected here -->
        </div>
    </div>
    <div id="signup-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

    <div class="bg-white p-6 rounded-xl w-96 shadow-xl">

        <h2 class="text-xl font-bold mb-4">Create Account</h2>

        <input id="signup-email"
        type="email"
        placeholder="Email"
        class="w-full mb-3 px-3 py-2 border rounded-lg">

        <input id="signup-password"
        type="password"
        placeholder="Password"
        class="w-full mb-3 px-3 py-2 border rounded-lg">

        <div class="flex gap-3">

            <button id="create-account"
            class="flex-1 bg-blue-600 text-white py-2 rounded-lg">
            Sign Up
            </button>

            <button id="close-signup"
            class="flex-1 bg-gray-200 py-2 rounded-lg">
            Cancel
            </button>

        </div>

        <p id="signup-error"
        class="text-red-500 text-sm mt-2 hidden"></p>

    </div>

</div>
    <script src="script.js"></script>
<script type="module" src="firebaseAuth.js"></script>
</body>
</html>
